<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Countdown Widget</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{--green:#2C4A3E;--orange:#D4653B;--cream:#F7F5F0;--lightgreen:#E8F0EC;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--cream);width:100%;min-height:100%;display:flex;flex-direction:column;align-items:center;padding:15px}
.widget-container{background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,0.12);width:100%;max-width:340px;overflow:hidden;border:2px solid var(--green)}
.header{background:linear-gradient(135deg,var(--green),#1a3028);color:#fff;padding:16px;text-align:center}
.header h1{font-size:1rem;font-weight:600}
.header p{font-size:0.7rem;opacity:0.8;margin-top:3px}
.body{padding:14px}
.input-group{margin-bottom:10px}
.input-group label{display:block;font-size:0.75rem;font-weight:600;color:var(--green);margin-bottom:4px}
.input-group input,.input-group select{width:100%;border:2px solid var(--lightgreen);border-radius:8px;padding:8px 10px;font-family:'Inter',sans-serif;font-size:0.82rem;outline:none;transition:border-color 0.2s;color:var(--green)}
.input-group input:focus,.input-group select:focus{border-color:var(--orange)}
.countdown-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin:12px 0}
.cd-box{background:linear-gradient(135deg,var(--green),#3d6354);color:#fff;border-radius:10px;padding:10px 4px;text-align:center}
.cd-box .num{font-size:1.6rem;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.cd-box .label{font-size:0.55rem;opacity:0.85;text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}
.progress-section{margin-top:10px}
.progress-bar{height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--orange),#e67e22);border-radius:5px;transition:width 0.5s;width:0%}
.progress-label{display:flex;justify-content:space-between;font-size:0.7rem;color:#666;margin-top:4px}
.motivation{background:var(--lightgreen);border-radius:10px;padding:10px;margin-top:10px;text-align:center;font-size:0.8rem;color:var(--green);font-style:italic;border-left:4px solid var(--orange)}
.presets{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.preset-btn{background:var(--lightgreen);color:var(--green);border:none;border-radius:8px;padding:5px 8px;font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.preset-btn:hover{background:var(--green);color:#fff}
.btn{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;width:100%;margin-top:6px;transition:opacity 0.2s}
.btn:hover{opacity:0.9}
.footer{background:var(--lightgreen);padding:10px;text-align:center;font-size:0.7rem;color:var(--green)}
.footer a{color:var(--orange);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="widget-container">
  <div class="header">
    <h1>Exam Countdown</h1>
    <p>Stay on track for your big day</p>
  </div>
  <div class="body">
    <div class="input-group">
      <label>Exam Name</label>
      <input type="text" id="examName" placeholder="e.g., IELTS Exam" value="My Exam">
    </div>
    <div class="input-group">
      <label>Exam Date</label>
      <input type="date" id="examDate">
    </div>
    <div class="input-group">
      <label>Quick Presets</label>
      <div class="presets">
        <button class="preset-btn" onclick="setPreset(14,'IELTS Mock Test')">+2 weeks</button>
        <button class="preset-btn" onclick="setPreset(30,'IELTS Exam')">+1 month</button>
        <button class="preset-btn" onclick="setPreset(60,'OET Exam')">+2 months</button>
        <button class="preset-btn" onclick="setPreset(90,'PLAB 2')">+3 months</button>
        <button class="preset-btn" onclick="setPreset(180,'NMC Registration')">+6 months</button>
      </div>
    </div>
    <button class="btn" onclick="startCountdown()">Start Countdown</button>
    <div class="countdown-grid" id="countdown" style="display:none">
      <div class="cd-box"><div class="num" id="days">0</div><div class="label">Days</div></div>
      <div class="cd-box"><div class="num" id="hours">0</div><div class="label">Hours</div></div>
      <div class="cd-box"><div class="num" id="minutes">0</div><div class="label">Minutes</div></div>
      <div class="cd-box"><div class="num" id="seconds">0</div><div class="label">Seconds</div></div>
    </div>
    <div class="progress-section" id="progressSection" style="display:none">
      <div class="progress-label"><span id="progressText">Study progress</span><span id="percentText">0%</span></div>
      <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
    </div>
    <div class="motivation" id="motivation" style="display:none">"Success is the sum of small efforts repeated day in and day out."</div>
  </div>
  <div class="footer">
    Powered by <a href="https://tools.anglotec-ai.com" target="_blank">Anglotec AI Academy</a>
  </div>
</div>
<script>
var targetDate=null;
var startDate=null;
var interval=null;
var quotes=[
  "Success is the sum of small efforts repeated day in and day out.",
  "The future belongs to those who believe in the beauty of their dreams.",
  "Don't watch the clock; do what it does. Keep going.",
  "Your only limit is your mind.",
  "Every expert was once a beginner.",
  "Dream big. Start small. Act now.",
  "The secret of getting ahead is getting started.",
  "Believe you can and you're halfway there.",
  "It always seems impossible until it's done.",
  "Push yourself, because no one else is going to do it for you."
];
function setPreset(days,name){
  var d=new Date();d.setDate(d.getDate()+days);
  document.getElementById('examDate').value=d.toISOString().split('T')[0];
  document.getElementById('examName').value=name;
}
// Set default to 30 days from now
var defDate=new Date();defDate.setDate(defDate.getDate()+30);
document.getElementById('examDate').value=defDate.toISOString().split('T')[0];
function startCountdown(){
  var dateVal=document.getElementById('examDate').value;
  if(!dateVal){alert('Please select an exam date');return;}
  targetDate=new Date(dateVal+"T00:00:00");
  startDate=new Date();
  if(targetDate<=startDate){alert('Please select a future date');return;}
  document.getElementById('countdown').style.display='grid';
  document.getElementById('progressSection').style.display='block';
  document.getElementById('motivation').style.display='block';
  document.getElementById('progressText').textContent='Study journey to '+document.getElementById('examName').value;
  document.getElementById('motivation').textContent='"'+quotes[Math.floor(Math.random()*quotes.length)+'"';
  if(interval)clearInterval(interval);
  updateCountdown();
  interval=setInterval(updateCountdown,1000);
}
function updateCountdown(){
  var now=new Date().getTime();
  var target=targetDate.getTime();
  var diff=target-now;
  if(diff<=0){clearInterval(interval);document.getElementById('days').textContent='0';document.getElementById('hours').textContent='00';document.getElementById('minutes').textContent='00';document.getElementById('seconds').textContent='00';document.getElementById('percentText').textContent='100%';document.getElementById('progressFill').style.width='100%';document.getElementById('motivation').textContent='Your exam is today! Good luck!';return;}
  var d=Math.floor(diff/86400000);
  var h=Math.floor((diff%86400000)/3600000);
  var m=Math.floor((diff%3600000)/60000);
  var s=Math.floor((diff%60000)/1000);
  document.getElementById('days').textContent=d;
  document.getElementById('hours').textContent=h<10?'0'+h:h;
  document.getElementById('minutes').textContent=m<10?'0'+m:m;
  document.getElementById('seconds').textContent=s<10?'0'+s:s;
  var totalTime=target-startDate.getTime();
  var elapsed=now-startDate.getTime();
  var pct=Math.min(100,Math.max(0,(elapsed/totalTime)*100));
  document.getElementById('percentText').textContent=Math.round(pct)+'%';
  document.getElementById('progressFill').style.width=pct+'%';
}
// Auto-start with default
startCountdown();
</script>
</body>
</html>
