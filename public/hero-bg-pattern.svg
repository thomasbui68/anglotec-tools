<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="nodes" width="120" height="120" patternUnits="userSpaceOnUse">
      <!-- Nodes -->
      <circle cx="30" cy="30" r="3" fill="#FDF6E3" opacity="0.08"/>
      <circle cx="90" cy="30" r="2" fill="#FDF6E3" opacity="0.06"/>
      <circle cx="60" cy="60" r="2.5" fill="#FDF6E3" opacity="0.07"/>
      <circle cx="0" cy="60" r="2" fill="#FDF6E3" opacity="0.05"/>
      <circle cx="90" cy="90" r="3" fill="#FDF6E3" opacity="0.08"/>
      <circle cx="30" cy="90" r="2" fill="#FDF6E3" opacity="0.06"/>
      <circle cx="60" cy="0" r="2" fill="#FDF6E3" opacity="0.05"/>
      <circle cx="120" cy="60" r="2.5" fill="#FDF6E3" opacity="0.06"/>
      <!-- Connections -->
      <line x1="30" y1="30" x2="60" y2="60" stroke="#FDF6E3" stroke-width="0.5" opacity="0.04"/>
      <line x1="60" y1="60" x2="90" y2="90" stroke="#FDF6E3" stroke-width="0.5" opacity="0.04"/>
      <line x1="90" y1="30" x2="60" y2="60" stroke="#FDF6E3" stroke-width="0.5" opacity="0.03"/>
      <line x1="30" y1="90" x2="60" y2="60" stroke="#FDF6E3" stroke-width="0.5" opacity="0.03"/>
      <line x1="30" y1="30" x2="90" y2="30" stroke="#FDF6E3" stroke-width="0.5" opacity="0.03"/>
      <line x1="30" y1="90" x2="90" y2="90" stroke="#FDF6E3" stroke-width="0.5" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="#2C4A3E"/>
  <rect width="1920" height="1080" fill="url(#nodes)"/>
</svg>