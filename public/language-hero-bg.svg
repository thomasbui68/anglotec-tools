<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="langBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F5F2"/>
      <stop offset="100%" style="stop-color:#E8F0E8"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="600" fill="url(#langBg)"/>
  <!-- Simplified world map dots -->
  <!-- North America -->
  <circle cx="350" cy="180" r="3" fill="#8BA888" opacity="0.15"/>
  <circle cx="320" cy="200" r="2.5" fill="#8BA888" opacity="0.12"/>
  <circle cx="380" cy="220" r="2" fill="#8BA888" opacity="0.1"/>
  <!-- South America -->
  <circle cx="420" cy="350" r="3" fill="#8BA888" opacity="0.12"/>
  <circle cx="400" cy="400" r="2.5" fill="#8BA888" opacity="0.1"/>
  <!-- Europe -->
  <circle cx="900" cy="170" r="3" fill="#8BA888" opacity="0.15"/>
  <circle cx="880" cy="190" r="2" fill="#8BA888" opacity="0.12"/>
  <circle cx="920" cy="185" r="2.5" fill="#8BA888" opacity="0.1"/>
  <!-- Africa -->
  <circle cx="880" cy="300" r="3" fill="#8BA888" opacity="0.12"/>
  <circle cx="900" cy="350" r="2.5" fill="#8BA888" opacity="0.1"/>
  <!-- Asia -->
  <circle cx="1300" cy="180" r="3" fill="#8BA888" opacity="0.15"/>
  <circle cx="1350" cy="200" r="2.5" fill="#8BA888" opacity="0.12"/>
  <circle cx="1400" cy="220" r="2" fill="#8BA888" opacity="0.1"/>
  <circle cx="1250" cy="250" r="3" fill="#8BA888" opacity="0.1"/>
  <!-- Australia -->
  <circle cx="1500" cy="380" r="3" fill="#8BA888" opacity="0.12"/>
  <circle cx="1550" cy="370" r="2" fill="#8BA888" opacity="0.1"/>
  <!-- Connecting lines -->
  <line x1="350" y1="180" x2="900" y2="170" stroke="#8BA888" stroke-width="0.5" opacity="0.08"/>
  <line x1="900" y1="170" x2="1300" y2="180" stroke="#8BA888" stroke-width="0.5" opacity="0.08"/>
  <line x1="900" y1="170" x2="880" y2="300" stroke="#8BA888" stroke-width="0.5" opacity="0.06"/>
  <line x1="1300" y1="180" x2="1500" y2="380" stroke="#8BA888" stroke-width="0.5" opacity="0.06"/>
  <!-- Globe outline -->
  <circle cx="960" cy="300" r="200" fill="none" stroke="#8BA888" stroke-width="1" opacity="0.06"/>
  <ellipse cx="960" cy="300" rx="120" ry="200" fill="none" stroke="#8BA888" stroke-width="0.5" opacity="0.04"/>
</svg>